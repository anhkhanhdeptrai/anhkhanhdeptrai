<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VNK IOT Flasher Pro</title>
    <link rel="icon" href="logo1.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Roboto+Mono:wght@400;700&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/esp-web-tools@10.0.0/dist/web/install-button.js?module"></script>
    <style>
        :root {
            --primary: #00d4ff;
            --primary-dark: #0099cc;
            --accent-1: #ff6bff;
            --accent-2: #00ff88;
            --accent-3: #ffd700;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-main: linear-gradient(135deg, #00d4ff, #ff6bff, #00ff88);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-glow: 0 8px 32px rgba(0, 212, 255, 0.3);
            --font-title: 'Orbitron', sans-serif;
            --font-code: 'Roboto Mono', monospace;
            --font-body: 'Inter', sans-serif;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0e17;
            color: #e0e7ff;
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 107, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%);
            z-index: 0;
            animation: gradientShift 15s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* Floating Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            animation: floatParticle linear infinite;
            opacity: 0.3;
        }

        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        .container-fluid {
            position: relative;
            z-index: 1;
            padding: 20px;
        }

        /* Sidebar */
        .sidebar {
            background: rgba(15, 22, 38, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 25px;
            height: calc(100vh - 40px);
            position: sticky;
            top: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-glow);
            overflow-y: auto;
            transition: all 0.3s ease;
        }

        .sidebar::-webkit-scrollbar {
            width: 6px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .sidebar-header {
            text-align: center;
            padding-bottom: 20px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--glass-border);
            position: relative;
        }

        .sidebar-header .logo {
            font-family: var(--font-title);
            font-size: 1.8rem;
            font-weight: 900;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            letter-spacing: 2px;
        }

        .sidebar-header .subtitle {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 4px;
            margin-top: 5px;
            font-weight: 300;
        }

        .sidebar-header .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--accent-2);
            border-radius: 50%;
            margin-left: 8px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .firmware-list-container h5 {
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .firmware-list-container h5 i {
            font-size: 1.2rem;
        }

        .list-group-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px !important;
            padding: 16px 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
            position: relative;
            overflow: hidden;
        }

        .list-group-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--gradient-main);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .list-group-item:hover {
            transform: translateX(8px) scale(1.02);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        .list-group-item.active {
            background: var(--gradient-main);
            color: white;
            border-color: transparent;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.4);
            transform: scale(1.05);
        }

        .list-group-item.active::before {
            opacity: 0;
        }

        .list-group-item .fw-icon {
            margin-right: 12px;
            font-size: 1.2rem;
        }

        .list-group-item .fw-badge {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.6rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 10px;
            border-radius: 20px;
            color: rgba(255, 255, 255, 0.5);
        }

        .list-group-item.active .fw-badge {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* Main Content */
        .main-content {
            padding: 0 10px;
        }

        /* Firmware Info */
        .firmware-info-container {
            background: rgba(15, 22, 38, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-glow);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .firmware-info-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(0, 212, 255, 0.05), transparent, rgba(255, 107, 255, 0.05), transparent);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .firmware-info-container > * {
            position: relative;
            z-index: 1;
        }

        .firmware-info-container .chip-icon {
            font-size: 4rem;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .firmware-info-container h2 {
            font-family: var(--font-title);
            font-size: 2.5rem;
            font-weight: 900;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .firmware-info-container .fw-desc {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 10px auto;
        }

        .firmware-info-container .fw-version {
            display: inline-block;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 5px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--primary);
            font-family: var(--font-code);
            margin-top: 10px;
        }

        /* Flash Container */
        .flash-container {
            background: rgba(15, 22, 38, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-glow);
        }

        .flash-container h3 {
            font-family: var(--font-title);
            font-size: 1.8rem;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .flash-container .alert {
            background: rgba(0, 212, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            color: var(--primary);
            border-radius: 16px;
            padding: 15px 20px;
            font-weight: 500;
        }

        .flash-container .alert i {
            margin-right: 10px;
        }

        /* ESP Web Tools Button */
        esp-web-install-button::part(button) {
            background: var(--gradient-main) !important;
            color: white !important;
            border: none !important;
            padding: 18px 40px !important;
            font-family: var(--font-title) !important;
            font-weight: 700 !important;
            text-transform: uppercase;
            border-radius: 16px !important;
            box-shadow: 0 0 40px rgba(0, 212, 255, 0.4) !important;
            transition: all 0.3s ease !important;
            font-size: 1.1rem !important;
            letter-spacing: 2px !important;
        }

        esp-web-install-button::part(button):hover {
            transform: scale(1.05) !important;
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.6) !important;
        }

        /* Digital Clock */
        .digital-clock {
            text-align: center;
            padding: 25px;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 20px;
            border: 1px solid rgba(0, 212, 255, 0.1);
            margin-top: 25px;
        }

        .digital-clock .time {
            font-family: var(--font-title);
            font-size: 4.5rem;
            font-weight: 900;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 5px;
            text-shadow: none;
        }

        .digital-clock .date {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 5px;
            font-weight: 300;
        }

        /* Social Links */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--glass-border);
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: rgba(255, 255, 255, 0.6);
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 1.2rem;
        }

        .social-links a:hover {
            transform: translateY(-5px) scale(1.1);
            border-color: var(--primary);
            color: var(--primary);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }

        /* Dark Mode Toggle */
        .dark-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }

        .dark-toggle .toggle-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            background: var(--gradient-main);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dark-toggle .toggle-btn:hover {
            transform: scale(1.1) rotate(45deg);
            box-shadow: 0 0 50px rgba(0, 212, 255, 0.5);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                height: auto;
                position: relative;
                top: 0;
                margin-bottom: 20px;
            }
            
            .main-content {
                padding: 0;
            }

            .firmware-info-container h2 {
                font-size: 1.8rem;
            }

            .digital-clock .time {
                font-size: 3rem;
            }

            .firmware-info-container {
                padding: 25px;
            }

            .flash-container {
                padding: 25px;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0e17;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gradient-main);
            border-radius: 10px;
        }

        /* Loading Animation */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--primary);
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Feature Cards */
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .feature-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .feature-card i {
            font-size: 2rem;
            background: var(--gradient-main);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .feature-card span {
            display: block;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <!-- Particles -->
    <div class="particles" id="particles"></div>

    <!-- Dark Mode Toggle -->
    <div class="dark-toggle">
        <button class="toggle-btn" id="themeToggle">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <!-- Main Content -->
    <div class="container-fluid">
        <div class="row g-4">
            <!-- Sidebar -->
            <div class="col-md-3">
                <div class="sidebar">
                    <div class="sidebar-header">
                        <div class="logo">
                            <i class="fas fa-microchip"></i> VNK DIY
                        </div>
                        <div class="subtitle">
                            IOT FLASHER <span class="status-dot"></span>
                        </div>
                    </div>

                    <div class="firmware-list-container">
                        <h5>
                            <i class="fas fa-list-ul"></i> Firmware
                            <span style="font-size:0.7rem;color:rgba(255,255,255,0.3);font-weight:300;margin-left:auto;">v2.0</span>
                        </h5>
                        <div class="list-group" id="firmwareList">
                            <!-- Generated by JS -->
                        </div>
                    </div>

                    <div style="margin-top:20px;padding-top:20px;border-top:1px solid var(--glass-border);">
                        <div class="feature-grid">
                            <div class="feature-card">
                                <i class="fas fa-bolt"></i>
                                <span>Fast Flash</span>
                            </div>
                            <div class="feature-card">
                                <i class="fas fa-shield-alt"></i>
                                <span>Secure</span>
                            </div>
                            <div class="feature-card">
                                <i class="fas fa-sync"></i>
                                <span>Auto Update</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main -->
            <div class="col-md-9 main-content">
                <!-- Firmware Info -->
                <div class="firmware-info-container" id="firmwareInfo">
                    <div class="chip-icon">
                        <i class="fas fa-microchip"></i>
                    </div>
                    <h2 id="fwTitle">Chọn Firmware</h2>
                    <p class="fw-desc" id="fwDesc">Chào mừng đến với VNK DIY IOT Flasher Pro</p>
                    <div class="fw-version" id="fwVersion">v1.0.0</div>
                    
                    <div class="social-links">
                        <a href="https://www.tiktok.com/@ZERODIY" target="_blank" title="TikTok">
                            <i class="fab fa-tiktok"></i>
                        </a>
                        <a href="#" target="_blank" title="GitHub">
                            <i class="fab fa-github"></i>
                        </a>
                        <a href="#" target="_blank" title="YouTube">
                            <i class="fab fa-youtube"></i>
                        </a>
                        <a href="#" target="_blank" title="Facebook">
                            <i class="fab fa-facebook"></i>
                        </a>
                    </div>
                </div>

                <!-- Flash Container -->
                <div class="flash-container">
                    <h3>
                        <i class="fas fa-bolt"></i> Flash Firmware
                    </h3>
                    
                    <div class="alert">
                        <i class="fas fa-plug"></i>
                        Kết nối ESP32 qua USB → Bấm nút Flash → Chọn cổng COM → Đợi hoàn tất
                    </div>

                    <div id="espWebToolsContainer" class="text-center my-4">
                        <!-- ESP Web Tools Button -->
                    </div>

                    <div class="digital-clock">
                        <div class="time" id="time">00:00:00</div>
                        <div class="date" id="date">Thứ Hai, 15 Tháng 11, 2025</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ======================== CONFIG ========================
        const firmwareList = [
            { 
                id: 'fw1', 
                name: 'ESP32 Basic', 
                file: 'firmware1.bin', 
                desc: 'Firmware cơ bản cho ESP32 với WiFi & Bluetooth',
                version: 'v2.1.0',
                chip: 'ESP32'
            },
            { 
                id: 'fw2', 
                name: 'ESP32-C3 Pro', 
                file: 'firmware2.bin', 
                desc: 'Firmware tối ưu cho ESP32-C3 với BLE 5.0',
                version: 'v1.8.3',
                chip: 'ESP32-C3'
            },
            { 
                id: 'fw3', 
                name: 'ESP32-S3 AI', 
                file: 'firmware3.bin', 
                desc: 'Firmware AI cho ESP32-S3 với TensorFlow Lite',
                version: 'v3.0.1',
                chip: 'ESP32-S3'
            },
            { 
                id: 'fw4', 
                name: 'ESP8266 IoT', 
                file: 'firmware4.bin', 
                desc: 'Firmware nhẹ cho ESP8266 IoT projects',
                version: 'v1.5.0',
                chip: 'ESP8266'
            }
        ];

        // ======================== PARTICLES ========================
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.width = (Math.random() * 4 + 2) + 'px';
                particle.style.height = particle.style.width;
                particle.style.animationDuration = (Math.random() * 20 + 10) + 's';
                particle.style.animationDelay = (Math.random() * 10) + 's';
                particle.style.opacity = Math.random() * 0.3 + 0.1;
                container.appendChild(particle);
            }
        }
        createParticles();

        // ======================== FIRMWARE LIST ========================
        const firmwareListEl = document.getElementById('firmwareList');
        firmwareListEl.innerHTML = firmwareList.map((fw, index) => `
            <button class="list-group-item ${index === 0 ? 'active' : ''}" data-id="${fw.id}">
                <span class="fw-icon"><i class="fas fa-microchip"></i></span>
                ${fw.name}
                <span class="fw-badge">${fw.chip}</span>
            </button>
        `).join('');

        // ======================== SELECT FIRMWARE ========================
        let selectedFirmware = firmwareList[0];

        document.querySelectorAll('#firmwareList .list-group-item').forEach(item => {
            item.addEventListener('click', function() {
                document.querySelectorAll('#firmwareList .list-group-item').forEach(i => i.classList.remove('active'));
                this.classList.add('active');
                
                const fwId = this.dataset.id;
                selectedFirmware = firmwareList.find(f => f.id === fwId) || firmwareList[0];
                updateUI(selectedFirmware);
            });
        });

        // ======================== UPDATE UI ========================
        function updateUI(firmware) {
            document.getElementById('fwTitle').textContent = firmware.name;
            document.getElementById('fwDesc').textContent = firmware.desc;
            document.getElementById('fwVersion').textContent = `${firmware.version} • ${firmware.chip}`;
            
            const container = document.getElementById('espWebToolsContainer');
            
            // Tạo manifest động
            const manifest = {
                name: firmware.name,
                version: firmware.version,
                builds: [
                    {
                        chipFamily: firmware.chip,
                        parts: [
                            { path: firmware.file, offset: 0 }
                        ]
                    }
                ]
            };

            container.innerHTML = `
                <esp-web-install-button
                    manifest="${btoa(JSON.stringify(manifest))}"
                    allow-multiple
                >
                    <i class="fas fa-bolt" slot="activate"></i>
                    <span slot="unsupported">
                        <i class="fas fa-exclamation-triangle"></i> Trình duyệt không hỗ trợ Web Serial
                    </span>
                    <span slot="not-allowed">
                        <i class="fas fa-lock"></i> Chưa được phép kết nối
                    </span>
                    <button slot="button" style="
                        background: var(--gradient-main);
                        color: white;
                        border: none;
                        padding: 18px 40px;
                        font-family: var(--font-title);
                        font-weight: 700;
                        text-transform: uppercase;
                        border-radius: 16px;
                        box-shadow: 0 0 40px rgba(0, 212, 255, 0.4);
                        transition: all 0.3s ease;
                        font-size: 1.1rem;
                        letter-spacing: 2px;
                        cursor: pointer;
                    ">
                        <i class="fas fa-bolt"></i> FLASH ${firmware.name}
                    </button>
                </esp-web-install-button>
            `;

            // Re-initialize ESP Web Tools
            const script = document.createElement('script');
            script.type = 'module';
            script.src = 'https://unpkg.com/esp-web-tools@10.0.0/dist/web/install-button.js?module';
            document.head.appendChild(script);
        }

        // ======================== INIT ========================
        updateUI(selectedFirmware);

        // ======================== CLOCK ========================
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
            document.getElementById('date').textContent = now.toLocaleDateString('vi-VN', { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            });
        }
        setInterval(updateClock, 1000);
        updateClock();

        // ======================== THEME TOGGLE ========================
        let isDark = true;
        document.getElementById('themeToggle').addEventListener('click', function() {
            isDark = !isDark;
            if (isDark) {
                document.body.style.background = '#0a0e17';
                document.body.style.color = '#e0e7ff';
                this.innerHTML = '<i class="fas fa-moon"></i>';
            } else {
                document.body.style.background = '#f0f4ff';
                document.body.style.color = '#1a1a2e';
                this.innerHTML = '<i class="fas fa-sun"></i>';
            }
        });

        // ======================== KEYBOARD SHORTCUTS ========================
        document.addEventListener('keydown', function(e) {
            // Ctrl + F: Focus firmware list
            if (e.ctrlKey && e.key === 'f') {
                e.preventDefault();
                document.querySelector('#firmwareList .list-group-item')?.focus();
            }
            
            // Ctrl + 1-4: Select firmware
            if (e.ctrlKey && e.key >= '1' && e.key <= '4') {
                const index = parseInt(e.key) - 1;
                const items = document.querySelectorAll('#firmwareList .list-group-item');
                if (items[index]) {
                    items[index].click();
                }
            }
        });

        // ======================== CONSOLE WELCOME ========================
        console.log('%c🚀 VNK DIY IOT Flasher Pro v2.0', 'font-size: 24px; font-weight: bold; color: #00d4ff;');
        console.log('%c🔧 Firmware: ' + selectedFirmware.name, 'font-size: 14px; color: #ff6bff;');
        console.log('%c💡 Ctrl+1-4 để chọn firmware nhanh', 'font-size: 12px; color: #00ff88;');

        // ======================== RESPONSIVE ========================
        function handleResize() {
            const sidebar = document.querySelector('.sidebar');
            if (window.innerWidth < 768) {
                sidebar.style.height = 'auto';
            } else {
                sidebar.style.height = 'calc(100vh - 40px)';
            }
        }
        window.addEventListener('resize', handleResize);
        handleResize();
    </script>
</body>
</html>
